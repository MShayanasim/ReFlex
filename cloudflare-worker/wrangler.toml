name = "reflex-notifier"
main = "src/worker.js"
compatibility_date = "2024-05-31"

# To deploy this worker locally, you will run:
# wrangler deploy

# Before deploying, make sure to add your secrets to Cloudflare via the CLI:
# wrangler secret put GOOGLE_CLIENT_SECRET
# (When prompted, paste your Google OAuth Web Application client secret)
#
# wrangler secret put BREVO_API_KEY
# (When prompted, paste your primary Brevo transactional email API key)
# Optional: wrangler secret put BREVO_API_KEY_2 / BREVO_API_KEY_3 / BREVO_API_KEY_4 for failover

[[kv_namespaces]]
binding = "RATE_LIMIT_STORE"
id = "a186198e74b14687be49a4a8cfb3f0ce"
