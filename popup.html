<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ReFlex Settings</title>
    <style>
        @font-face {
            font-family: 'Inter';
            font-style: normal;
            font-weight: 400;
            font-display: swap;
            src: url('fonts/Inter-Regular.ttf') format('truetype');
        }
        @font-face {
            font-family: 'Inter';
            font-style: normal;
            font-weight: 500;
            font-display: swap;
            src: url('fonts/Inter-Medium.ttf') format('truetype');
        }
        @font-face {
            font-family: 'Inter';
            font-style: normal;
            font-weight: 600;
            font-display: swap;
            src: url('fonts/Inter-SemiBold.ttf') format('truetype');
        }
        @font-face {
            font-family: 'Inter';
            font-style: normal;
            font-weight: 700;
            font-display: swap;
            src: url('fonts/Inter-Bold.ttf') format('truetype');
        }
    </style>
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #6366f1;
            --accent-hover: #818cf8;
            --danger-color: #ef4444;
        }

        body {
            width: 320px;
            margin: 0;
            padding: 20px;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
        }

        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header img {
            width: 128px;
            height: auto;
        }

        /* Toggle Switch styling */
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--surface-color);
            border-radius: 12px;
            margin-bottom: 16px;
        }

        .setting-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .setting-title {
            font-weight: 500;
            font-size: 0.95rem;
        }

        .setting-desc {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #334155;
            transition: .3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--accent-color);
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        .desc {
            font-weight: 600;
            margin-bottom: 16px;
        }

        .toggle-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface-color);
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
        }

        .footer {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 16px;
        }

        .credits {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .credits p {
            margin: 4px 0;
        }

        .credits a {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            padding: 6px 12px;
            background: rgba(99, 102, 241, 0.1);
            color: var(--accent-hover);
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .credits a:hover {
            background: rgba(99, 102, 241, 0.2);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="reflex-icon-128.png" alt="ReFlex Logo" />
    </div>
    <div class="container">
        <p class="desc">ReFlex Dashboard</p>
        <div class="toggle-container">
            <span class="toggle-label">Enable UI Overhaul</span>
            <label class="switch">
                <input type="checkbox" id="masterToggle" checked>
                <span class="slider"></span>
            </label>
        </div>
        
        <div class="toggle-container" style="flex-direction: column; align-items: flex-start; gap: 8px;">
            <div style="display: flex; justify-content: space-between; width: 100%;">
                <span class="toggle-label" style="font-weight: 500;">Email Notifications</span>
            </div>
            <div id="loginSection" style="width: 100%; display: flex; flex-direction: column; gap: 8px;">
                <span class="setting-desc">Log in to receive email alerts when your grades are updated.</span>
                <button id="loginBtn" style="background: var(--accent-color); color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: 500; transition: background 0.2s;">Login with Google</button>
            </div>
            <div id="loggedInSection" style="display: none; width: 100%; flex-direction: column; gap: 4px;">
                <span class="setting-desc" style="color: #4ade80;">✓ Logged in as:</span>
                <span id="userEmailDisplay" style="font-size: 0.85rem; font-weight: 500;"></span>
                <button id="logoutBtn" style="background: rgba(239, 68, 68, 0.1); color: var(--danger-color); border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; margin-top: 4px; align-self: flex-start; font-size: 0.8rem; transition: background 0.2s;">Logout</button>
            </div>
        </div>
        <div class="footer">
            Refresh the portal page to see changes.
        </div>
        
        <div class="credits">
            <p>By Muhammad Shayan Asim</p>
            <p>Fast NUCES Karachi</p>
            <div style="display: flex; flex-direction: column; gap: 6px;">
                <a href="https://github.com/MShayanasim/ReFlex" target="_blank" rel="noopener noreferrer">
                    ⭐ Star the repo on GitHub!
                </a>
                <a href="https://github.com/MShayanasim/ReFlex/blob/main/PRIVACY.md" target="_blank" rel="noopener noreferrer" style="font-size: 0.8rem; padding: 4px; background: transparent; color: var(--text-secondary); margin-top: 0;">
                    Read Privacy Policy
                </a>
            </div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
